meta:
  name: Kogane
  kanji: 黄金
  slug: kogane
  role: primary theme — gold acts
  version: 1.0.0
  language: KINTSUGI (Zinzaki design language)
  author: Zinzaki
  mode: dark

tokens:
  # tone — warm lacquer monochrome (~97% of any screen)
  ink-0:  "#0B0A08"   # void — app / terminal background
  ink-1:  "#12100C"   # surface — panels
  ink-2:  "#1B1813"   # raised — cards, tiles
  ink-3:  "#262119"   # hover / active
  line-0: "#362C1B"   # hairline (gold-tinted)
  line-1: "#4C3D24"   # strong border
  bone-0: "#F7EED2"   # headings / highlight
  bone-1: "#EDE3C4"   # primary text
  bone-2: "#C9BC96"   # secondary text
  bone-3: "#94866A"   # muted / meta
  bone-4: "#6B5F49"   # ghost / disabled
  kin-0:  "#EAC578"   # gold glow — hover
  kin-1:  "#D6AE66"   # GOLD — action, links, cursor
  kin-2:  "#8F713C"   # dim gold — labels, glyphs
  kin-3:  "#57441F"   # deep gold
  kin-w:  "#3F3112"   # gold wash — fills
  kaki-1: "#C67F45"   # persimmon — warning, lamp
  washi-bg:   "#E7DCBB"  # paper artifact inside darkness
  washi-ink:  "#292019"
  washi-line: "#C9BA92"
  # triggers — rare psychological events (~3%)
  aka-0:  "#D4665C"   # scarlet text on dark / hover
  aka-1:  "#BB3C33"   # SCARLET (hanko / torii) — the irreversible
  aka-2:  "#7E302E"   # red lacquer — pressed
  sabi:   "#9B635F"   # dusty rust — calm red contexts
  aka-w:  "#331514"   # wash — diff-del, error fills
  mori-0: "#8FAC6F"   # light moss — success text
  mori-1: "#52703F"   # MOSS — life, confirmation
  mori-2: "#2F4526"   # pine depth
  mori-w: "#1B2615"   # wash — diff-add
  # service — terminal & syntax only, never UI
  hotaru-0: "#98A4D4"
  hotaru-1: "#7C88B8"  # ansi blue / types
  hotaru-2: "#454E7A"
  fuji-0:   "#B89BCC"
  fuji-1:   "#9C7FB0"  # ansi magenta / constants / AI
  fuji-2:   "#5A4973"
  seiji-0:  "#8CBCA9"
  seiji-1:  "#6FA08E"  # ansi cyan / live
  seiji-2:  "#2C5A4C"
  shin-2:   "#0A3540"  # deep-water optional second darkness
  shin-3:   "#06222B"

semantic:
  gold-law: "GOLD IS GILDING, NOT A SLAB. It lives only as line, edge, frame, glyph, thin stroke. Never a filled button / plate / large area. Max gold area = a <=2px stroke or an icon glyph. A primary button is a gold-framed dark surface with gold text — not a gold rectangle."
  primary: "gilded frame"  # dark surface (ink-2) + 1.5px gold border + gold text (kin-1)
  primary-hover: "border kin-0 + gold glow + gold@8% fill tint"
  destructive: aka-1        # scarlet FILL is allowed: a trigger, rare and small; text on it #FFF3ED
  success: mori-1           # fills ok (life); text on dark -> mori-0
  warning: kaki-1
  special-ai: fuji-1        # rare
  live-data: seiji-1
  focus-ring: "kin-1 @14%"
  selection: "kin-1 @22%"

# ── ROLES — the contract. Consumers use a role, never a raw token. ──
# Each role resolves to "token" or "token @NN" (NN% over transparent).
# washi overrides only where a token would break on paper.
roles:
  # surfaces
  bg.app:            ink-0
  bg.surface:        ink-1
  bg.raised:         ink-2
  bg.hover:          ink-3
  # borders / gilding (decorative gold, >=3:1 is enough — it is an edge, not text)
  border.hairline:   line-0
  border.strong:     line-1
  border.gold:       kin-1
  # text (every text role is guaranteed >=4.5:1 on bg.surface, ghost >=3:1)
  text.heading:      bone-0
  text.body:         bone-1
  text.secondary:    bone-2
  text.muted:        bone-3
  text.ghost:        bone-4
  text.gold:         kin-1     # text-safe gold (washi overrides to kin-t)
  text.link:         kin-1
  # action — a gilded frame, never a gold slab
  action.edge:       kin-1
  action.text:       kin-1
  action.tint:       "kin-1 @6%"
  action.hover.edge: kin-0
  # feedback
  ok.text:           mori-0
  ok.fill:           mori-1
  ok.wash:           mori-w
  warn.text:         kaki-1
  danger.text:       aka-0
  danger.fill:       aka-1     # scarlet MAY fill — the fill is the event
  danger.wash:       aka-w
  info.text:         kin-1     # info lives in tone, never blue
  special.text:      fuji-1
  # interaction
  focus.ring:        "kin-1 @40%"
  selection.bg:      "kin-1 @22%"
  # syntax (terminal & editor only)
  syntax.keyword:    kin-1
  syntax.string:     mori-0
  syntax.number:     kaki-1
  syntax.type:       hotaru-1
  syntax.constant:   fuji-1
  syntax.comment:    bone-4

terminal:
  background: "#0B0A08"
  foreground: "#EDE3C4"
  cursor:     "#D6AE66"
  selection_background: "#3F3112"
  ansi:    ["#1B1813","#C54D49","#8FAC6F","#D6AE66","#7C88B8","#9C7FB0","#6FA08E","#EDE3C4"]
  brights: ["#6B5F49","#DC7265","#A8C48A","#EAC578","#98A4D4","#B89BCC","#8CBCA9","#F7EED2"]

