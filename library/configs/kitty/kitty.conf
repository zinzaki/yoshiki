# ╭─ kitty ─ warm lacquer, room to breathe ───
# │  colors come from the generated theme; this is the dressing
# ╰╴
include ../../themes/kitty/kogane.conf      # ← generated; swap for washi

# ── type ──
font_family      JetBrains Mono
font_size        13.0
adjust_line_height 120%                     # 余白 — vertical air between lines

# ── Ma — the window breathes, content never on the wall ──
window_padding_width 14
hide_window_decorations yes
background_opacity 1.0                       # lacquer is opaque, not glassy

# ── cursor — gold, calm (no blink: stillness) ──
cursor_shape     beam
cursor_blink_interval 0

# ── tabs — a hairline, not powerline; one dot separator ──
tab_bar_style    separator
tab_separator    "  ·  "
tab_bar_min_tabs 2

# ── silence — no bell, no noise ──
enable_audio_bell no
scrollback_lines 10000
