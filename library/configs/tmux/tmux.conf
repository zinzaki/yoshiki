# ╭─ tmux ─ quiet status, gold seams ───
# │  hex values mirror canon/palette/kogane; keep them in sync
# ╰╴
set -g status-style              "bg=#0B0A08,fg=#94866A"
set -g status-justify            left

# ── left — a gold mark + session name ──
set -g status-left               " ◆ #S   "
set -g status-left-style         "fg=#D6AE66"

# ── windows — active in bone, rest dim; selection by color, not brackets ──
set -g window-status-format         " #W "
set -g window-status-current-format " #W "
set -g window-status-current-style  "fg=#EDE3C4"
set -g window-status-style          "fg=#6B5F49"

# ── right — the clock, dim gold, quiet ──
set -g status-right              "#[fg=#8F713C]%H:%M "

# ── pane borders — hairline; active edge gilded ──
set -g pane-border-style         "fg=#362C1B"
set -g pane-active-border-style  "fg=#8F713C"

# ── silence ──
set -g visual-bell off
set -g monitor-bell off
