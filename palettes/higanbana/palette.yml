meta:
  name: Higanbana
  kanji: 彼岸花
  slug: higanbana
  role: spider-lily variant of urushi — scarlet lily leads the elements
  version: 1.0.0
  language: KINTSUGI (Zinzaki design language)
  author: Zinzaki
  mode: dark

inherits: kogane

tokens:
  # spider lily ramp (OKLCH hue ~25deg) — added on top of kogane tokens
  lily-p: "#E88479"   # petal — active-nav text, soft accents
  lily-0: "#E65F57"   # glow — hover, progress head, cursor
  lily-1: "#DE3C3A"   # LILY — primary buttons, statusbar mode
  lily-2: "#89292C"   # depth — pressed, gradient pair
  lily-w: "#3A1616"   # wash

semantic:
  primary: lily-1
  primary-hover: lily-0
  primary-text-on-fill: bone-0
  gold-rule: "gold stays veins-only (as in urushi)"
  note: "the 'rarity = power' rule is consciously traded away: red becomes an area. Trigger-scarlet (aka) stays darker and duller than the lily so critical events remain distinguishable."
  destructive: aka-1
  success: mori-1
  warning: kaki-1
  focus-ring: "lily-0 @15%"
  detail: "VU meters: every 4th bar gold — a vein in the scarlet field. Scrollbar: red lacquer #46211C."

terminal:
  cursor: "#DE3C3A"   # lily cursor; everything else inherits kogane
